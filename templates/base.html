<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Newsletter Management{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; }
        main { flex: 1; }
        .navbar-brand { font-weight: 600; letter-spacing: 0.02em; }
        .navbar-dark .navbar-nav .nav-link { color: rgba(255,255,255,0.85); }
        .navbar-dark .navbar-nav .nav-link:hover,
        .navbar-dark .navbar-nav .nav-link.active { color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('subscription.subscriptions') }}"><i class="bi bi-shield-check me-2"></i>Security Portal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.blueprint == 'subscription' else '' }}" href="{{ url_for('subscription.subscriptions') }}"><i class="bi bi-people me-1"></i>Subscriptions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.blueprint == 'review' else '' }}" href="{{ url_for('review.reviews') }}"><i class="bi bi-shield-check me-1"></i>Vulnerability Reviews</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.blueprint == 'operations' else '' }}" href="{{ url_for('operations.operations') }}"><i class="bi bi-terminal me-1"></i>Operations</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-secondary py-3 mt-auto">
        <div class="container text-center small">
            &copy; 2026 Security Portal
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block script %}
    {% endblock %}
</body>
</html>
