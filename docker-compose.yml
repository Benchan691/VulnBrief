services:
  local-mongo:
    image: mongo:7
    container_name: webserver-local-mongo
    restart: unless-stopped
    volumes:
      - local-mongo-data:/data/db

  web:
    build: .
    container_name: webserver-web
    restart: unless-stopped
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://local-mongo:27017/
    depends_on:
      - local-mongo
    volumes:
      - ./newsletters:/app/newsletters

  preprocessor:
    build: .
    container_name: webserver-preprocessor
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  scheduler:
    build: .
    container_name: webserver-scheduler
    restart: unless-stopped
    command: ["python", "scheduler.py"]
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://local-mongo:27017/
    depends_on:
      - local-mongo

volumes:
  local-mongo-data:
