services:
  web:
    build: .
    container_name: webserver-web
    restart: unless-stopped
    ports:
      - "9100:9100"
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://host.docker.internal:27017/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./newsletters:/app/newsletters
      - ${AVD_ROOT:-/home/cpcnet/cyberclawer}:/cyberclawer
