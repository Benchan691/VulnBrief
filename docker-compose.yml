services:
  local-mongo:
    image: mongo:7
    container_name: webserver-local-mongo
    restart: unless-stopped
    volumes:
      - local-mongo-data:/data/db

  web:
    build: .
    container_name: webserver-web
    restart: unless-stopped
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://local-mongo:27017/
    depends_on:
      - local-mongo
    volumes:
      - ./newsletters:/app/newsletters

  preprocessor-scanner:
    build: .
    container_name: webserver-preprocessor-scanner
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py", "--role", "scanner"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  preprocessor-router:
    build: .
    container_name: webserver-preprocessor-router
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py", "--role", "router"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  company-ai-worker:
    build: .
    container_name: webserver-company-ai-worker
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py", "--role", "company-worker"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  deepseek-worker:
    build: .
    container_name: webserver-deepseek-worker
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py", "--role", "deepseek-worker"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  gemini-worker:
    build: .
    container_name: webserver-gemini-worker
    restart: unless-stopped
    command: ["python", "company_ai_preprocessor.py", "--role", "gemini-worker"]
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

  scheduler:
    build: .
    container_name: webserver-scheduler
    restart: unless-stopped
    command: ["python", "scheduler.py"]
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://local-mongo:27017/
    depends_on:
      - local-mongo

volumes:
  local-mongo-data:
