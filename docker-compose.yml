services:
  web:
    build: .
    container_name: webserver-web
    restart: unless-stopped
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      LOCAL_MONGO_URI: mongodb://host.docker.internal:27017/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./newsletters:/app/newsletters
