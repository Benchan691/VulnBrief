x-llama-server: &llama-server
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  restart: unless-stopped
  logging:
    driver: "none"
  networks:
    - gpu-internal
  env_file:
    - .env
  volumes:
    - ./models:/models:ro
  command:
    - "-m"
    - "${GPU_MODEL_PATH}"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8080"
    - "-ngl"
    - "99"
    - "-c"
    - "${GPU_CONTEXT_SIZE:-4096}"
    - "--parallel"
    - "1"
    - "--log-verbosity"
    - "${GPU_LLAMA_LOG_VERBOSITY:-1}"

x-gpu-worker: &gpu-worker
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - gpu-internal

x-llama-healthcheck: &llama-healthcheck
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 120s

services:
  llama-server:
    <<: [*llama-server, *llama-healthcheck]
    profiles: ["tensor-split"]
    container_name: gpu-preprocessor-llama
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "-m"
      - "${GPU_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-ngl"
      - "99"
      - "-c"
      - "${GPU_CONTEXT_SIZE:-4096}"
      - "--parallel"
      - "1"
      - "--tensor-split"
      - "${GPU_TENSOR_SPLIT:-1,1,1}"
      - "--log-verbosity"
      - "${GPU_LLAMA_LOG_VERBOSITY:-1}"

  llama-server-0:
    <<: [*llama-server, *llama-healthcheck]
    profiles: ["per-gpu"]
    container_name: gpu-preprocessor-llama-0
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  llama-server-1:
    <<: [*llama-server, *llama-healthcheck]
    profiles: ["per-gpu"]
    container_name: gpu-preprocessor-llama-1
    ports:
      - "127.0.0.1:8081:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  llama-server-2:
    <<: [*llama-server, *llama-healthcheck]
    profiles: ["per-gpu"]
    container_name: gpu-preprocessor-llama-2
    ports:
      - "127.0.0.1:8082:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]

  gpu-worker:
    <<: *gpu-worker
    profiles: ["per-gpu"]
    container_name: gpu-preprocessor-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      GPU_INFERENCE_BASE_URLS: http://host.docker.internal:8080/v1,http://host.docker.internal:8081/v1,http://host.docker.internal:8082/v1
    depends_on:
      llama-server-0:
        condition: service_healthy
      llama-server-1:
        condition: service_healthy
      llama-server-2:
        condition: service_healthy

  gpu-worker-tensor:
    <<: *gpu-worker
    profiles: ["tensor-split"]
    container_name: gpu-preprocessor-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      GPU_INFERENCE_BASE_URLS: http://host.docker.internal:8080/v1
    depends_on:
      llama-server:
        condition: service_healthy

networks:
  gpu-internal:
    driver: bridge
