services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: gpu-preprocessor-llama
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "127.0.0.1:8080:8080"

    volumes:
      - ./models:/models:ro

    gpus: all

    command:
      - "-m"
      - "${GPU_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-ngl"
      - "99"
      - "-c"
      - "${GPU_CONTEXT_SIZE:-4096}"
      - "--tensor-split"
      - "${GPU_TENSOR_SPLIT:-1,1,1}"

  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: gpu-preprocessor-worker
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - llama-server

    environment:
      GPU_INFERENCE_BASE_URL: "http://llama-server:8080/v1"
      LLAMA_SERVER_URL: "http://llama-server:8080"
      GPU_SERVER_URL: "http://llama-server:8080"
