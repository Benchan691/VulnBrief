x-llama-server: &llama-server
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  restart: unless-stopped
  logging:
    driver: "none"
  networks:
    - gpu-internal
  volumes:
    - ./models:/models:ro
  command:
    - "-m"
    - "${GPU_MODEL_PATH:-/models/Qwen3_Qwen3_30B-A3B-Instruct-2507_Q4_K_M.gguf}"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8080"
    - "-ngl"
    - "99"
    - "-c"
    - "${GPU_CONTEXT_SIZE:-4096}"
    - "--parallel"
    - "1"
    - "--log-verbosity"
    - "${GPU_LLAMA_LOG_VERBOSITY:-1}"

services:
  llama-server:
    <<: *llama-server
    container_name: gpu-preprocessor-llama
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    command:
      - "-m"
      - "${GPU_MODEL_PATH:-/models/Qwen3_Qwen3_30B-A3B-Instruct-2507_Q4_K_M.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-ngl"
      - "99"
      - "-c"
      - "${GPU_CONTEXT_SIZE:-4096}"
      - "--parallel"
      - "1"
      - "--tensor-split"
      - "${GPU_TENSOR_SPLIT:-1,1,1}"
      - "--log-verbosity"
      - "${GPU_LLAMA_LOG_VERBOSITY:-1}"

  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu-preprocessor-worker
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - gpu-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      GPU_SERVER_CONFIG: /app/config/gpu_server.json
    volumes:
      - ./config:/app/config:ro
    depends_on:
      llama-server:
        condition: service_healthy

networks:
  gpu-internal:
    driver: bridge
